              rawQuery: true
              refId: A
              rawSql: |
                SELECT
                  device_id,
                  pod_key,
                  soil_moisture_percent::text AS observed,
                  '10' AS threshold,
                  1::double precision AS value
                FROM (
                  SELECT DISTINCT ON (device_id, pod_key)
                    device_id,
                    pod_key,
                    timestamp_utc,
                    soil_moisture_percent
                  FROM telemetry_pod_readings_flat
                  WHERE enabled = true
                    AND soil_moisture_percent IS NOT NULL
                    AND timestamp_utc >= now() - interval '15 minutes'
                  ORDER BY device_id, pod_key, timestamp_utc DESC
                ) latest
                WHERE soil_moisture_percent < 10
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: senior-pomidor-telemetry
        noDataState: OK
