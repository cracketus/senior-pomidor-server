      - uid: sp_edge_network_health_failures
        title: Edge network health failures
        condition: B
        data:
          - refId: A
            datasourceUid: senior-pomidor-postgres
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: postgres
                uid: senior-pomidor-postgres
              editorMode: code
              format: table
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              refId: A
              rawSql: |
                WITH latest AS (
                  SELECT DISTINCT ON (device_id)
                    device_id,
                    timestamp_utc,
                    system_health_jsonb
                  FROM telemetry_events
                  WHERE timestamp_utc >= now() - interval '10 minutes'
                    AND system_health_jsonb ? 'network'
                  ORDER BY device_id, timestamp_utc DESC
                ),
                checks AS (
                  SELECT
                    device_id,
                    check_name,
                    observed,
                    1::double precision AS value
                  FROM latest
                  CROSS JOIN LATERAL (
                    VALUES
                      ('wifi_profile_count', system_health_jsonb #>> '{network,wifi_profile_count}', (nullif(system_health_jsonb #>> '{network,wifi_profile_count}', '')::integer = 0)),
                      ('wifi_connected', system_health_jsonb #>> '{network,wifi_connected}', (system_health_jsonb #>> '{network,wifi_connected}' = 'false')),
