name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      commit_sha: ${{ steps.tag.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: tag
        name: Require an annotated semantic-version tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$(git cat-file -t "refs/tags/$version")" == tag ]]
          commit_sha="$(git rev-list -n 1 "$version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

  test-quality-security:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests, quality, and Python security checks
        run: nox -s tests lint format_check types security deps_audit

  image-scans:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build scan image
        run: docker build -t senior-pomidor-server:release-scan .
      - name: Scan repository
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: senior-pomidor-server:release-scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  publish:
    needs: [validate-tag, test-quality-security, image-scans]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE: ghcr.io/cracketus/senior-pomidor-server
      VERSION: ${{ needs.validate-tag.outputs.version }}
      COMMIT_SHA: ${{ needs.validate-tag.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: existing-image
        name: Reuse only an existing image from this commit
        shell: bash
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            docker pull "$IMAGE:$VERSION"
            revision="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$IMAGE:$VERSION")"
            if [[ "$revision" != "$COMMIT_SHA" ]]; then
              echo "$IMAGE:$VERSION exists for revision $revision, not $COMMIT_SHA; refusing overwrite" >&2
              exit 1
            fi
            version_manifest_hash="$(docker buildx imagetools inspect "$IMAGE:$VERSION" --raw | sha256sum | cut -d' ' -f1)"
            if docker buildx imagetools inspect "$IMAGE:$COMMIT_SHA" >/dev/null 2>&1; then
              sha_manifest_hash="$(docker buildx imagetools inspect "$IMAGE:$COMMIT_SHA" --raw | sha256sum | cut -d' ' -f1)"
              [[ "$sha_manifest_hash" == "$version_manifest_hash" ]] || {
                echo "$IMAGE:$COMMIT_SHA does not reference the immutable $IMAGE:$VERSION manifest" >&2
                exit 1
              }
            else
              docker buildx imagetools create --tag "$IMAGE:$COMMIT_SHA" "$IMAGE:$VERSION"
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            if docker buildx imagetools inspect "$IMAGE:$COMMIT_SHA" >/dev/null 2>&1; then
              echo "$IMAGE:$COMMIT_SHA already exists without $IMAGE:$VERSION; refusing ambiguous release" >&2
              exit 1
            fi
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and publish multi-architecture image
        if: steps.existing-image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:${{ env.COMMIT_SHA }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.COMMIT_SHA }}
            org.opencontainers.image.version=${{ env.VERSION }}
      - name: Verify anonymous GHCR access
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io
          docker buildx imagetools inspect "$IMAGE:$VERSION" >/dev/null
      - name: Build source-free runtime bundle
        run: bash deploy/scripts/build-runtime-bundle.sh "$VERSION" dist
      - name: Confirm runtime bundle contains no Python source
        run: '! tar -tzf "dist/senior-pomidor-runtime-$VERSION.tar.gz" | grep -E "(^|/)(app|migrations)/|\.py$"'
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"
          fi
          gh release upload "$VERSION" \
            "dist/senior-pomidor-runtime-$VERSION.tar.gz" \
            "dist/senior-pomidor-runtime-$VERSION.tar.gz.sha256" \
            --clobber
