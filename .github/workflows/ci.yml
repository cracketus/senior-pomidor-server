name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: nox -s tests

      - name: Validate self-contained local Compose configuration
        env:
          APP_IMAGE: senior-pomidor-server:ci
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile observability --profile daily-story config --quiet

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run quality checks
        run: nox -s lint format_check types

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Python security checks
        run: nox -s security deps_audit

      - name: Build Docker image
        run: docker build -t senior-pomidor-server:ci .

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "senior-pomidor-server:ci"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
