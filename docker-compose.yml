services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
    depends_on:
      - postgres
      - mosquitto
    ports:
      - "8000:8000"
    volumes:
      - photo_data:/app/data/photos

  worker:
    build: .
    command: python -m app.mqtt_worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
    depends_on:
      - postgres
      - mosquitto
    volumes:
      - photo_data:/app/data/photos

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: senior_pomidor
      POSTGRES_USER: senior_pomidor
      POSTGRES_PASSWORD: senior_pomidor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:
  photo_data:
