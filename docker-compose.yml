services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
      TELEMETRY_UPLOAD_TOKEN: ${TELEMETRY_UPLOAD_TOKEN:-}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "${API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - photo_data:/app/data/photos
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build: .
    command: python -m app.mqtt_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
      TELEMETRY_UPLOAD_TOKEN: ${TELEMETRY_UPLOAD_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - photo_data:/app/data/photos

  grafana-cloud-exporter:
    build: .
    command: python -m app.grafana_cloud_exporter
    restart: unless-stopped
    profiles:
      - cloud-export
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}
      GRAFANA_CLOUD_EXPORT_ENABLED: ${GRAFANA_CLOUD_EXPORT_ENABLED:-false}
      GRAFANA_CLOUD_REMOTE_WRITE_URL: ${GRAFANA_CLOUD_REMOTE_WRITE_URL:-}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID:-}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN:-}
      GRAFANA_CLOUD_EXPORT_INTERVAL_SECONDS: ${GRAFANA_CLOUD_EXPORT_INTERVAL_SECONDS:-60}
      GRAFANA_CLOUD_EXPORT_LOOKBACK_MINUTES: ${GRAFANA_CLOUD_EXPORT_LOOKBACK_MINUTES:-10}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: senior_pomidor
      POSTGRES_USER: senior_pomidor
      POSTGRES_PASSWORD: senior_pomidor
      GRAFANA_DB_USER: ${GRAFANA_DB_USER:-grafana_reader}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-grafana_reader}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-grafana-reader.sh:/docker-entrypoint-initdb.d/20-grafana-reader.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senior_pomidor -d senior_pomidor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PUBLISHED_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t healthcheck -m ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GRAFANA_DB_USER: ${GRAFANA_DB_USER:-grafana_reader}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-grafana_reader}
    ports:
      - "${GRAFANA_PUBLISHED_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  photo_data:
  grafana_data:
