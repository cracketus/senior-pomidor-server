---
# Application-only Compose base. Local infrastructure is in docker-compose.dev.yml;
# production network attachment is in docker-compose.prod.yml.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://senior_pomidor:senior_pomidor@postgres:5432/senior_pomidor}

services:
  migrate:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: alembic upgrade head
    restart: "no"
    environment: *app-environment
    logging: *default-logging

  api:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      <<: *app-environment
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
      TELEMETRY_UPLOAD_TOKEN: ${TELEMETRY_UPLOAD_TOKEN:-}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
      mosquitto:
        condition: service_healthy
    ports:
      - "${LAN_BIND_ADDRESS:-127.0.0.1}:${API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ${PHOTO_DATA_DIR:-/srv/apps/senior-pomidor/data/public/photos}:/app/data/photos
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  worker:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: python -m app.mqtt_worker
    restart: unless-stopped
    environment:
      <<: *app-environment
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-senior-pomidor}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-data/photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-26214400}
      PHOTO_UPLOAD_TOKEN: ${PHOTO_UPLOAD_TOKEN:-}
      TELEMETRY_UPLOAD_TOKEN: ${TELEMETRY_UPLOAD_TOKEN:-}
      WORKER_HEALTH_FILE: /tmp/senior-pomidor-worker-health.json
    depends_on:
      migrate:
        condition: service_completed_successfully
      mosquitto:
        condition: service_healthy
    volumes:
      - ${PHOTO_DATA_DIR:-/srv/apps/senior-pomidor/data/public/photos}:/app/data/photos
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  state-estimator-worker:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: python -m app.state_estimator_worker
    restart: unless-stopped
    environment:
      <<: *app-environment
      STATE_ESTIMATOR_ENABLED: ${STATE_ESTIMATOR_ENABLED:-true}
      STATE_ESTIMATOR_TIMEZONE: ${STATE_ESTIMATOR_TIMEZONE:-Europe/Vienna}
      STATE_ESTIMATOR_PRIVATE_LOG_DIR: /app/data/private
      WORKER_HEALTH_FILE: /tmp/senior-pomidor-state-estimator-health.json
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ${ESTIMATOR_PRIVATE_DATA_DIR:-/srv/logs/senior-pomidor/estimator-private}:/app/data/private
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck", "state_estimator_healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  grafana-cloud-exporter:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: python -m app.grafana_cloud_exporter
    restart: unless-stopped
    profiles:
      - cloud-export
    environment:
      <<: *app-environment
      GRAFANA_CLOUD_EXPORT_ENABLED: ${GRAFANA_CLOUD_EXPORT_ENABLED:-false}
      GRAFANA_CLOUD_REMOTE_WRITE_URL: ${GRAFANA_CLOUD_REMOTE_WRITE_URL:-}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID:-}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN:-}
      GRAFANA_CLOUD_EXPORT_INTERVAL_SECONDS: ${GRAFANA_CLOUD_EXPORT_INTERVAL_SECONDS:-60}
      GRAFANA_CLOUD_EXPORT_LOOKBACK_MINUTES: ${GRAFANA_CLOUD_EXPORT_LOOKBACK_MINUTES:-10}
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging: *default-logging

  daily-story-worker:
    image: ${APP_IMAGE:?APP_IMAGE must reference an immutable release image}
    command: python -m app.daily_story_worker
    restart: unless-stopped
    profiles:
      - daily-story
    environment:
      <<: *app-environment
      DAILY_STORY_NODE_ID: ${DAILY_STORY_NODE_ID:-pi-001}
      DAILY_STORY_SCHEDULE_TIME: ${DAILY_STORY_SCHEDULE_TIME:-09:00}
      DAILY_STORY_TIMEZONE: ${DAILY_STORY_TIMEZONE:-Europe/Vienna}
      DAILY_STORY_LOOKBACK_HOURS: ${DAILY_STORY_LOOKBACK_HOURS:-24}
      DAILY_STORY_POLL_INTERVAL_SECONDS: ${DAILY_STORY_POLL_INTERVAL_SECONDS:-60}
      DAILY_STORY_MAX_ATTEMPTS: ${DAILY_STORY_MAX_ATTEMPTS:-3}
      DAILY_STORY_RETRY_DELAY_MINUTES: ${DAILY_STORY_RETRY_DELAY_MINUTES:-15}
      DAILY_STORY_STALE_AFTER_MINUTES: ${DAILY_STORY_STALE_AFTER_MINUTES:-15}
      DAILY_STORY_SYSTEM_PROMPT_PATH: /app/config/daily_story/system.txt
      DAILY_STORY_USER_PROMPT_PATH: /app/config/daily_story/user.txt
      DAILY_STORY_ENVIRONMENT_CONTEXT_PATH: /app/config/daily_story/environment.json
      DAILY_STORY_MAX_CONTEXT_CHARS: ${DAILY_STORY_MAX_CONTEXT_CHARS:-16000}
      DAILY_STORY_MAX_ENVIRONMENT_CONTEXT_CHARS: ${DAILY_STORY_MAX_ENVIRONMENT_CONTEXT_CHARS:-8000}
      DAILY_STORY_MEMORY_ENTRIES: ${DAILY_STORY_MEMORY_ENTRIES:-7}
      DAILY_STORY_OLLAMA_HOST: ${DAILY_STORY_OLLAMA_HOST:-http://ollama:11434}
      DAILY_STORY_OLLAMA_MODEL: ${DAILY_STORY_OLLAMA_MODEL:-llama3.2:3b}
      DAILY_STORY_OLLAMA_TIMEOUT_SECONDS: ${DAILY_STORY_OLLAMA_TIMEOUT_SECONDS:-120}
      DAILY_STORY_OLLAMA_KEEP_ALIVE: ${DAILY_STORY_OLLAMA_KEEP_ALIVE:-0}
      DAILY_STORY_OLLAMA_REQUEST_RETRIES: ${DAILY_STORY_OLLAMA_REQUEST_RETRIES:-3}
      DAILY_STORY_OLLAMA_OPTIONS_JSON: ${DAILY_STORY_OLLAMA_OPTIONS_JSON:-'{"temperature":0.4,"top_p":0.9,"top_k":40,"num_ctx":4096,"num_predict":2048,"repeat_penalty":1.1,"seed":42}'}
      WORKER_HEALTH_FILE: /tmp/senior-pomidor-daily-story-health.json
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./config/daily_story:/app/config/daily_story:ro
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck", "daily_story_waiting", "daily_story_succeeded", "daily_story_skipped_no_data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${LAN_BIND_ADDRESS:-127.0.0.1}:${MQTT_PUBLISHED_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${MOSQUITTO_DATA_DIR:-/srv/apps/senior-pomidor/data/private/mosquitto}:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t healthcheck -m ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
